<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300" role="img" aria-labelledby="title desc">
  <title id="title">Dinicley Aguiar</title>
  <desc id="desc">Foto circular com animação suave de flutuação</desc>

  <defs>
    <clipPath id="circleClip">
      <circle cx="140" cy="135" r="105" />
    </clipPath>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#00E5FF" flood-opacity="0.30" />
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0A66C2" flood-opacity="0.40" />
    </filter>

    <linearGradient id="borderGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="55%" stop-color="#0A66C2" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
  </defs>

  <ellipse cx="140" cy="274" rx="72" ry="12" fill="#0A66C2" opacity="0.20">
    <animate attributeName="rx" values="72;58;72" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.20;0.10;0.20" dur="3s" repeatCount="indefinite" />
  </ellipse>

  <g filter="url(#softShadow)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 5; 0 18; 0 5"
      keyTimes="0; 0.5; 1"
      dur="3s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" />

    <circle cx="140" cy="135" r="112" fill="#0D1117" stroke="url(#borderGradient)" stroke-width="6" />

    <image
      href="https://raw.githubusercontent.com/dinicleyaguiar/dinicleyaguiar/main/assets/dinicley-aguiar.png"
      x="35"
      y="30"
      width="210"
      height="210"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#circleClip)" />

    <circle cx="140" cy="135" r="105" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2" />
  </g>
</svg>
